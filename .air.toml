root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -buildvcs=false -o ./tmp/server ./cmd/server"
bin = "./tmp/server"
delay = 500
exclude_dir = ["tmp", "vendor", "data", ".git"]
exclude_regex = ["_test\\.go"]
include_ext = ["go", "html", "css", "js"]
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
