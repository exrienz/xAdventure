services:
  app:
    build: .
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - DB_PATH=/data/adventure.db
      - OPENAI_API_BASE=https://llm.code-x.my/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_IMAGE_MODEL=${OPENAI_IMAGE_MODEL:-gpt-image-1}
      - LLM_TIMEOUT_SEC=60
      - LLM_MAX_RETRIES=2
      - LLM_TEMPERATURE=0.85
      - LLM_TOP_P=0.95
      - REQUEST_MAX_BYTES=1048576
      - FEATURE_FLAGS=novel_gen_v2_prompt_fix,kids_mode,kids_storybook_v2,enable_dynamic_kids_stories,syllable_coloring
      - FEATURE_ROLLOUT=enhanced_narrative_logic=10
      - KIDS_LLM_MODEL=${KIDS_LLM_MODEL}
    volumes:
      - adventure_data:/data
    restart: unless-stopped

volumes:
  adventure_data:
